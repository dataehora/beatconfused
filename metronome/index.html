<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatConfused | Online Metronome with Tap Tempo, Subdivisions, and Visual Beats</title>
  <meta
    name="description"
    content="BeatConfused is a fast online metronome with tap tempo, organized time signatures, beat subdivisions, multiple visualizations, sound styles, and responsive musician-friendly controls."
  />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta name="theme-color" content="#10131d" />
  <link rel="canonical" href="https://beatconfused.com/metronome/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="BeatConfused | Online Metronome with Tap Tempo" />
  <meta
    property="og:description"
    content="Practice with tap tempo, multiple time signatures, beat subdivisions, sound styles, and animated metronome views."
  />
  <meta property="og:url" content="https://beatconfused.com/metronome/" />
  <meta property="og:site_name" content="BeatConfused" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="BeatConfused | Online Metronome with Tap Tempo" />
  <meta
    name="twitter:description"
    content="A responsive online metronome for musicians with tap tempo, subdivisions, sound styles, and visual beat modes."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Marck+Script&display=swap"
    rel="stylesheet"
  />
  <link id="appStylesheet" rel="stylesheet" href="styles.css" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebApplication",
          "name": "BeatConfused",
          "url": "https://beatconfused.com/metronome/",
          "applicationCategory": "MultimediaApplication",
          "operatingSystem": "Web Browser",
          "description": "An online metronome with tap tempo, time signatures, beat subdivisions, sound styles, and multiple beat visualizers for practice.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          }
        }
      ]
    }
  </script>
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">BeatConfused Studio Edition</p>
      <h1>Jazz Metronome</h1>
    </header>

    <section class="metronome" aria-labelledby="metronome-title" data-visual-mode="pendulum">
      <h2 id="metronome-title" class="sr-only">Metronome</h2>

      <div class="visual-stage" aria-live="polite">
        <div class="pulse visual-element" id="pulse" aria-hidden="true"></div>
        <div class="number-display visual-element" id="numberDisplay" aria-hidden="true">1</div>
        <div class="pendulum visual-element" id="pendulum" aria-hidden="true">
          <svg class="pendulum-device" viewBox="0 0 240 300" role="presentation" focusable="false">
            <defs>
              <linearGradient id="caseGradient" x1="40" y1="14" x2="200" y2="284" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#caa06a" />
                <stop offset="1" stop-color="#8a5a30" />
              </linearGradient>
              <linearGradient id="windowGradient" x1="120" y1="38" x2="120" y2="260" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#362b21" />
                <stop offset="1" stop-color="#1b1512" />
              </linearGradient>
              <clipPath id="pendulumWindowClip">
                <rect x="54" y="38" width="132" height="222" rx="4" />
              </clipPath>
            </defs>

            <ellipse class="device-shadow" cx="120" cy="288" rx="86" ry="9" />

            <path class="device-case" d="M36 14 L204 14 L223 284 L17 284 Z" fill="url(#caseGradient)" />

            <rect class="device-window" x="54" y="38" width="132" height="222" rx="4" fill="url(#windowGradient)" />

            <g class="scale-ticks" clip-path="url(#pendulumWindowClip)">
              <line x1="72" y1="80" x2="168" y2="80" />
              <line x1="72" y1="130" x2="168" y2="130" />
              <line x1="72" y1="180" x2="168" y2="180" />
              <line x1="72" y1="230" x2="168" y2="230" />
            </g>

            <!-- pivots near the base, like a real metronome's escapement — the
                 rod is fixed at the bottom and the free end swings above it -->
            <g class="pendulum-swing" clip-path="url(#pendulumWindowClip)">
              <rect class="pendulum-rod" x="118.4" y="52" width="3.2" height="194" rx="1.6" />
              <g class="pendulum-carriage">
                <path class="pendulum-weight" d="M120 134 L136 150 L120 166 L104 150 Z" />
                <path class="pendulum-weight-highlight" d="M120 140 L129 150 L120 154 Z" />
              </g>
              <circle class="pendulum-pivot" cx="120" cy="246" r="5" />
            </g>
          </svg>
        </div>
        <p id="beatLabel" class="beat-label">Beat 1</p>

        <div class="display-toggle" role="radiogroup" aria-label="Visual style">
          <label class="pill pill-sm">
            <input type="radio" name="visualMode" value="pulse" />
            <span>Pulse</span>
          </label>
          <label class="pill pill-sm">
            <input type="radio" name="visualMode" value="numbers" />
            <span>Numbers</span>
          </label>
          <label class="pill pill-sm">
            <input type="radio" name="visualMode" value="pendulum" checked />
            <span>Pendulum</span>
          </label>
        </div>
      </div>

      <div class="tempo-hero">
        <button id="decreaseBtn" type="button" class="small-btn" aria-label="Decrease BPM" title="Decrease BPM (↓)">−</button>
        <div class="bpm-readout">
          <input id="bpmInput" type="number" min="40" max="240" step="1" value="120" aria-label="Tempo in beats per minute" title="Tempo (BPM)" />
          <span class="bpm-unit">BPM</span>
        </div>
        <button id="increaseBtn" type="button" class="small-btn" aria-label="Increase BPM" title="Increase BPM (↑)">+</button>
      </div>
      <input id="bpmRange" type="range" min="40" max="240" value="120" class="bpm-slider" aria-label="Tempo slider" />

      <div class="transport-row">
        <button id="toggleBtn" class="toggle-btn" type="button" aria-pressed="false" title="Start / stop (Space)">Start</button>
        <button id="tapBtn" type="button" class="small-btn tap-btn" title="Tap tempo (T)">Tap</button>
      </div>
      <p id="tapStatus" class="hint tap-status" aria-live="polite"></p>

      <div class="beat-indicators" id="beatIndicators" aria-label="Beat indicators"></div>

      <div class="controls-grid">
        <div class="control-block">
          <span class="sr-only">Time signature</span>
          <select id="timeSignature" aria-label="Time signature">
            <optgroup label="Simple">
              <option value="2/2" data-beats="2">2/2</option>
              <option value="2/4" data-beats="2">2/4</option>
              <option value="3/4" data-beats="3">3/4</option>
              <option value="4/4" data-beats="4" selected>4/4</option>
              <option value="6/4" data-beats="6">6/4</option>
            </optgroup>
            <optgroup label="Compound">
              <option value="3/8" data-beats="3">3/8</option>
              <option value="6/8" data-beats="6">6/8</option>
              <option value="9/8" data-beats="9">9/8</option>
              <option value="12/8" data-beats="12">12/8</option>
            </optgroup>
            <optgroup label="Odd">
              <option value="5/4" data-beats="5">5/4</option>
              <option value="5/8" data-beats="5">5/8</option>
              <option value="7/8" data-beats="7">7/8</option>
            </optgroup>
          </select>

          <div class="pill-group" role="radiogroup" aria-label="Beat subdivision">
            <label class="pill pill-sm">
              <input type="radio" name="subdivision" value="1" checked />
              <span>1</span>
            </label>
            <label class="pill pill-sm">
              <input type="radio" name="subdivision" value="2" />
              <span>2</span>
            </label>
            <label class="pill pill-sm">
              <input type="radio" name="subdivision" value="3" />
              <span>3</span>
            </label>
            <label class="pill pill-sm">
              <input type="radio" name="subdivision" value="4" />
              <span>4</span>
            </label>
            <label class="pill pill-sm">
              <input type="radio" name="subdivision" value="6" />
              <span>6</span>
            </label>
            <label class="pill pill-sm">
              <input type="radio" name="subdivision" value="8" />
              <span>8</span>
            </label>
          </div>
        </div>

        <div class="control-block">
          <select id="soundStyle" aria-label="Sound tone">
            <option value="electronic" selected>Electronic</option>
            <option value="bossa">Bossa</option>
            <option value="jazz">Jazz</option>
            <option value="wood">Wood</option>
            <option value="cymbal">Cymbal</option>
            <option value="cowbell">Cowbell</option>
          </select>

          <div class="sound-row">
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.7" aria-label="Volume" title="Volume" />

            <div class="pill-group">
              <label class="pill pill-sm">
                <input id="soundToggle" type="checkbox" checked />
                <span>Audio</span>
              </label>
              <label class="pill pill-sm">
                <input id="vibrationToggle" type="checkbox" />
                <span>Haptics</span>
              </label>
            </div>
          </div>

          <div class="pill-group" role="radiogroup" aria-label="Counting display">
            <label class="pill pill-sm">
              <input type="radio" name="countMode" value="beat" checked />
              <span>Beat</span>
            </label>
            <label class="pill pill-sm">
              <input type="radio" name="countMode" value="measure" />
              <span>Bar</span>
            </label>
            <label class="pill pill-sm">
              <input type="radio" name="countMode" value="off" />
              <span>Off</span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>Crafted for musicians who value tone, timing, and taste.</p>
      <p class="footer-links">
        <a href="https://beatconfused.com">beatconfused.com</a>
      </p>
      <p class="footer-contact">
        <a href="mailto:beatconfused@beatconfused.com">beatconfused@beatconfused.com</a>
      </p>
    </footer>
  </main>

  <script>
    (function loadVersionedAssets() {
      const version = new URLSearchParams(window.location.search).get("__v");
      const stylesheet = document.getElementById("appStylesheet");

      if (version && stylesheet) {
        stylesheet.href = `styles.css?__v=${encodeURIComponent(version)}`;
      }

      const appScript = document.createElement("script");
      appScript.src = version
        ? `script.js?__v=${encodeURIComponent(version)}`
        : "script.js";
      document.body.appendChild(appScript);
    })();
  </script>
</body>
</html>
