  <script>
    // Builds the homepage tuner icon as a small, static replica of the real
    // /tuner/ strobe wheel (same half-circle wedge construction, scaled down
    // to icon size), frozen in the green "in tune" state for A4 440Hz at
    // 0 cents — rather than an unrelated decorative graphic.
    (function buildTunerIcon() {
      const NS = "http://www.w3.org/2000/svg";
      const wedgesGroup = document.getElementById("tunerIconWedges");

      if (!wedgesGroup) {
        return;
      }

      const cx = 150;
      const cy = 150;
      const rings = [
        { inner: 100, outer: 120, count: 16 },
        { inner: 72, outer: 92, count: 8 },
        { inner: 44, outer: 64, count: 4 },
      ];

      function polar(r, deg) {
        const rad = (deg * Math.PI) / 180;
        return { x: cx + r * Math.sin(rad), y: cy - r * Math.cos(rad) };
      }

      function wedgePath(innerR, outerR, startDeg, endDeg) {
        const startOuter = polar(outerR, startDeg);
        const endOuter = polar(outerR, endDeg);
        const startInner = polar(innerR, startDeg);
        const endInner = polar(innerR, endDeg);
        const largeArc = endDeg - startDeg > 180 ? 1 : 0;

        return (
          `M ${startInner.x.toFixed(2)} ${startInner.y.toFixed(2)} ` +
          `L ${startOuter.x.toFixed(2)} ${startOuter.y.toFixed(2)} ` +
          `A ${outerR} ${outerR} 0 ${largeArc} 1 ${endOuter.x.toFixed(2)} ${endOuter.y.toFixed(2)} ` +
          `L ${endInner.x.toFixed(2)} ${endInner.y.toFixed(2)} ` +
          `A ${innerR} ${innerR} 0 ${largeArc} 0 ${startInner.x.toFixed(2)} ${startInner.y.toFixed(2)} Z`
        );
      }

      rings.forEach((ring, ringIndex) => {
        const g = document.createElementNS(NS, "g");
        g.setAttribute("class", ringIndex % 2 === 0 ? "tuner-icon-wedges" : "tuner-icon-wedges tuner-icon-wedges-alt");

        const totalSlices = ring.count * 2;
        const step = 360 / totalSlices;

        for (let i = 0; i < totalSlices; i += 2) {
          const path = document.createElementNS(NS, "path");
          path.setAttribute("d", wedgePath(ring.inner, ring.outer, i * step, (i + 1) * step));
          g.appendChild(path);
        }

        wedgesGroup.appendChild(g);
      });
    })();
  </script>
